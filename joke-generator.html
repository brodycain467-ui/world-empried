<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Random Joke Generator</title>
  <link rel="stylesheet" href="css/joke-style.css">
</head>
<body>
  <div class="container">
    <div class="joke-card">
      <h1>😂 Joke Generator</h1>
      
      <div id="jokeDisplay" class="joke-display">
        <p id="jokeText">Click the button to get a joke!</p>
      </div>

      <div class="button-group">
        <button id="getJokeBtn" onclick="fetchJoke()">Get a Joke</button>
        <button id="nextJokeBtn" onclick="fetchJoke()" style="display: none;">Next Joke</button>
        <button onclick="copyJoke()">📋 Copy</button>
        <button onclick="shareJoke()">📤 Share</button>
      </div>

      <div id="loading" class="loading" style="display: none;">
        <p>Loading joke...</p>
      </div>

      <div id="error" class="error" style="display: none;">
        <p id="errorText">Something went wrong. Please try again!</p>
      </div>

      <div class="joke-stats">
        <p id="jokeCount">Jokes loaded: 0</p>
      </div>
    </div>
  </div>

  <script src="js/joke-generator.js"></script>
</body>
</html>
